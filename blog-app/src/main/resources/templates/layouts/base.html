<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'Blog App'">Blog App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container nav-inner">
        <a class="brand" th:href="@{/}">📝 BlogApp</a>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts/new}" class="btn btn-primary btn-sm">+ New Post</a>
        </div>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="container" style="margin-top:1rem;">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-danger"  th:text="${errorMessage}"></div>
</div>

<!-- PAGE CONTENT -->
<main class="container main-content">
    <th:block th:fragment="content"></th:block>
</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <p>&copy; 2025 BlogApp — Built with Spring Boot &amp; Thymeleaf</p>
    </div>
</footer>

</body>
</html>
