<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit} ? 'Edit Post — BlogApp' : 'New Post — BlogApp'">Post Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container nav-inner">
        <a class="brand" th:href="@{/}">📝 BlogApp</a>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
        </div>
    </div>
</nav>

<main class="container main-content">

    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        <a th:href="@{/}">Home</a> &rsaquo;
        <span th:text="${isEdit} ? 'Edit Post' : 'New Post'">Form</span>
    </div>

    <div class="form-page card">
        <h1 th:text="${isEdit} ? '✏️ Edit Post' : '✍️ Create New Post'">Post Form</h1>

        <form th:action="${isEdit} ? @{/posts/{id}/update(id=${post.id})} : @{/posts}"
              method="post"
              th:object="${post}">

            <!-- Global error -->
            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                Please fix the errors below before submitting.
            </div>

            <!-- TITLE -->
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" th:field="*{title}"
                       class="input-field" placeholder="Enter post title"/>
                <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
            </div>

            <!-- AUTHOR -->
            <div class="form-group">
                <label for="author">Author *</label>
                <input type="text" id="author" th:field="*{author}"
                       class="input-field" placeholder="Author name"/>
                <span th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="field-error"></span>
            </div>

            <!-- EXCERPT -->
            <div class="form-group">
                <label for="excerpt">Excerpt <small>(auto-generated if left blank)</small></label>
                <textarea id="excerpt" th:field="*{excerpt}"
                          class="input-field textarea" rows="2"
                          placeholder="Short summary of the post (optional)"></textarea>
            </div>

            <!-- CONTENT -->
            <div class="form-group">
                <label for="content">Content *</label>
                <textarea id="content" th:field="*{content}"
                          class="input-field textarea textarea-lg" rows="12"
                          placeholder="Write your post content here..."></textarea>
                <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="field-error"></span>
            </div>

            <!-- TAGS -->
            <div class="form-group">
                <label for="tagsCsv">Tags <small>(comma-separated, e.g. Java, Spring Boot, Web Dev)</small></label>
                <input type="text" id="tagsCsv" name="tagsCsv"
                       th:value="${tagsCsv}"
                       class="input-field" placeholder="Java, Spring Boot, Web Dev"/>

                <!-- Existing tags as clickable hints -->
                <div class="tag-hints" th:if="${tags != null and !tags.isEmpty()}">
                    <small>Existing: </small>
                    <span th:each="tag : ${tags}" class="tag-hint"
                          onclick="addTag(this.textContent)"
                          th:text="${tag.name}"></span>
                </div>
            </div>

            <!-- PUBLISHED AT -->
            <div class="form-group">
                <label for="publishedAt">Published Date & Time</label>
                <input type="datetime-local" id="publishedAt"
                       th:field="*{publishedAt}"
                       class="input-field"/>
            </div>

            <!-- IS PUBLISHED -->
            <div class="form-group form-check">
                <input type="checkbox" id="isPublished" th:field="*{published}" class="checkbox"/>
                <label for="isPublished">Published (visible to readers)</label>
            </div>

            <!-- ACTIONS -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${isEdit} ? '💾 Update Post' : '🚀 Publish Post'">Submit</button>
                <a th:href="${isEdit} ? @{/posts/{id}(id=${post.id})} : @{/}"
                   class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2025 BlogApp — Built with Spring Boot &amp; Thymeleaf</p>
    </div>
</footer>

<script>
function addTag(name) {
    const input = document.getElementById('tagsCsv');
    const current = input.value.trim();
    const tags = current ? current.split(',').map(t => t.trim()) : [];
    if (!tags.includes(name)) {
        tags.push(name);
        input.value = tags.join(', ');
    }
}
</script>

</body>
</html>
