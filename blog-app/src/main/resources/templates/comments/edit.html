<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Comment — BlogApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="container nav-inner">
        <a class="brand" th:href="@{/}">📝 BlogApp</a>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
        </div>
    </div>
</nav>

<main class="container main-content">
    <div class="breadcrumb">
        <a th:href="@{/}">Home</a> &rsaquo;
        <a th:href="@{/posts/{id}(id=${postId})}">Post</a> &rsaquo;
        Edit Comment
    </div>

    <div class="form-page card">
        <h1>✏️ Edit Comment</h1>

        <form th:action="@{/posts/{pid}/comments/{cid}/update(pid=${postId}, cid=${comment.id})}"
              method="post"
              th:object="${comment}">

            <div class="form-group">
                <label>Name *</label>
                <input type="text" th:field="*{name}" class="input-field"/>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" th:field="*{email}" class="input-field"/>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label>Comment *</label>
                <textarea th:field="*{comment}" class="input-field textarea" rows="4"></textarea>
                <span th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}" class="field-error"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Update Comment</button>
                <a th:href="@{/posts/{id}(id=${postId})}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2025 BlogApp — Built with Spring Boot &amp; Thymeleaf</p>
    </div>
</footer>
</body>
</html>
